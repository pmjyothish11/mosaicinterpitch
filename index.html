<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mosaic — GP Profiler</title>
<link href="https://fonts.googleapis.com/css2?family=Alata&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #1e436c;
    --blue: #295c94;
    --dark: #132a44;
    --gold: #c9a84c;
    --light: #eeeeee;
    --soft: #d4d4d4;
    --white: #ffffff;
    --p1: #295c94;
    --p2: #b85042;
    --p3: #3b6d11;
    --p4: #854f0b;
    --p5: #533ab7;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--dark);
    color: var(--white);
    min-height: 100vh;
    padding: 0;
  }

  header {
    background: var(--navy);
    border-bottom: 3px solid var(--gold);
    padding: 20px 32px;
    display: flex;
    align-items: center;
    gap: 16px;
  }

  header .logo {
    font-family: 'Alata', sans-serif;
    font-size: 22px;
    color: var(--white);
    letter-spacing: 0.5px;
  }

  header .divider {
    width: 1px;
    height: 24px;
    background: rgba(255,255,255,0.3);
  }

  header .subtitle {
    font-size: 13px;
    color: var(--gold);
    letter-spacing: 1px;
    text-transform: uppercase;
    font-weight: 500;
  }

  .container {
    max-width: 760px;
    margin: 0 auto;
    padding: 40px 24px 80px;
  }

  .intro {
    margin-bottom: 40px;
  }

  .intro h1 {
    font-family: 'Alata', sans-serif;
    font-size: 28px;
    font-weight: 400;
    color: var(--white);
    margin-bottom: 10px;
    line-height: 1.3;
  }

  .intro p {
    font-size: 14px;
    color: var(--soft);
    line-height: 1.7;
  }

  .gp-name-row {
    display: flex;
    gap: 12px;
    margin-bottom: 32px;
    align-items: flex-end;
  }

  .gp-name-row label {
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--gold);
    display: block;
    margin-bottom: 6px;
    font-weight: 500;
  }

  .gp-name-row input {
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 6px;
    color: var(--white);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    padding: 10px 14px;
    width: 100%;
    outline: none;
    transition: border-color 0.2s;
  }

  .gp-name-row input:focus {
    border-color: var(--gold);
  }

  .gp-name-row input::placeholder { color: rgba(255,255,255,0.3); }

  .name-field { flex: 2; }
  .location-field { flex: 1; }

  .progress-bar {
    height: 3px;
    background: rgba(255,255,255,0.1);
    border-radius: 2px;
    margin-bottom: 36px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: var(--gold);
    border-radius: 2px;
    transition: width 0.4s ease;
    width: 0%;
  }

  .question-block {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px;
    padding: 24px;
    margin-bottom: 20px;
    transition: border-color 0.2s;
  }

  .question-block.answered {
    border-color: rgba(201,168,76,0.3);
  }

  .q-number {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--gold);
    font-weight: 500;
    margin-bottom: 8px;
  }

  .q-text {
    font-size: 16px;
    font-weight: 400;
    color: var(--white);
    margin-bottom: 6px;
    line-height: 1.5;
  }

  .q-hint {
    font-size: 12px;
    color: rgba(255,255,255,0.4);
    margin-bottom: 18px;
    font-style: italic;
  }

  .options {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .option {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 10px 14px;
    border-radius: 8px;
    border: 1px solid rgba(255,255,255,0.1);
    cursor: pointer;
    transition: all 0.15s;
    background: transparent;
    text-align: left;
    width: 100%;
    font-family: 'DM Sans', sans-serif;
  }

  .option:hover {
    background: rgba(255,255,255,0.06);
    border-color: rgba(255,255,255,0.2);
  }

  .option.selected {
    background: rgba(201,168,76,0.12);
    border-color: var(--gold);
  }

  .option-dot {
    width: 16px;
    height: 16px;
    border-radius: 50%;
    border: 1.5px solid rgba(255,255,255,0.3);
    flex-shrink: 0;
    margin-top: 2px;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .option.selected .option-dot {
    border-color: var(--gold);
    background: var(--gold);
  }

  .option.selected .option-dot::after {
    content: '';
    width: 6px;
    height: 6px;
    background: var(--dark);
    border-radius: 50%;
  }

  .option-text {
    font-size: 13px;
    color: rgba(255,255,255,0.8);
    line-height: 1.5;
  }

  .option.selected .option-text {
    color: var(--white);
  }

  .submit-btn {
    width: 100%;
    padding: 16px;
    background: var(--gold);
    border: none;
    border-radius: 8px;
    font-family: 'Alata', sans-serif;
    font-size: 16px;
    color: var(--dark);
    cursor: pointer;
    margin-top: 12px;
    transition: opacity 0.2s;
    letter-spacing: 0.5px;
  }

  .submit-btn:hover { opacity: 0.9; }
  .submit-btn:disabled { opacity: 0.3; cursor: not-allowed; }

  /* Results */
  .results {
    display: none;
  }

  .results.visible { display: block; }

  .results-header {
    margin-bottom: 32px;
  }

  .results-header h2 {
    font-family: 'Alata', sans-serif;
    font-size: 24px;
    font-weight: 400;
    margin-bottom: 4px;
  }

  .results-header .gp-label {
    font-size: 14px;
    color: var(--gold);
  }

  .primary-persona {
    background: var(--navy);
    border: 2px solid var(--gold);
    border-radius: 12px;
    padding: 24px;
    margin-bottom: 24px;
  }

  .primary-persona .label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--gold);
    margin-bottom: 8px;
    font-weight: 500;
  }

  .primary-persona .name {
    font-family: 'Alata', sans-serif;
    font-size: 26px;
    color: var(--white);
    margin-bottom: 6px;
  }

  .primary-persona .desc {
    font-size: 13px;
    color: var(--soft);
    line-height: 1.6;
    margin-bottom: 16px;
  }

  .primary-persona .pct {
    font-family: 'Alata', sans-serif;
    font-size: 48px;
    color: var(--gold);
    line-height: 1;
  }

  .persona-bars {
    display: flex;
    flex-direction: column;
    gap: 14px;
    margin-bottom: 32px;
  }

  .persona-bar-row {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .persona-bar-label {
    font-size: 12px;
    color: var(--soft);
    width: 160px;
    flex-shrink: 0;
    line-height: 1.3;
  }

  .persona-bar-track {
    flex: 1;
    height: 8px;
    background: rgba(255,255,255,0.08);
    border-radius: 4px;
    overflow: hidden;
  }

  .persona-bar-fill {
    height: 100%;
    border-radius: 4px;
    transition: width 1s ease;
    width: 0%;
  }

  .persona-bar-pct {
    font-size: 13px;
    font-weight: 500;
    color: var(--white);
    width: 40px;
    text-align: right;
    flex-shrink: 0;
  }

  .pitch-order {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px;
    padding: 24px;
    margin-bottom: 24px;
  }

  .pitch-order h3 {
    font-family: 'Alata', sans-serif;
    font-size: 16px;
    font-weight: 400;
    color: var(--gold);
    margin-bottom: 16px;
    letter-spacing: 0.5px;
  }

  .pitch-item {
    display: flex;
    gap: 14px;
    padding: 10px 0;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    align-items: flex-start;
  }

  .pitch-item:last-child { border-bottom: none; }

  .pitch-rank {
    font-size: 11px;
    font-weight: 500;
    color: var(--gold);
    width: 20px;
    flex-shrink: 0;
    padding-top: 2px;
  }

  .pitch-content { flex: 1; }

  .pitch-angle-name {
    font-size: 13px;
    font-weight: 500;
    color: var(--white);
    margin-bottom: 3px;
  }

  .pitch-angle-desc {
    font-size: 12px;
    color: rgba(255,255,255,0.5);
    line-height: 1.5;
  }

  .pitch-pct {
    font-size: 12px;
    font-weight: 500;
    padding: 2px 8px;
    border-radius: 4px;
    flex-shrink: 0;
  }

  .pct-h { background: #EAF3DE; color: #3B6D11; }
  .pct-m { background: #FAEEDA; color: #854F0B; }
  .pct-l { background: #FCEBEB; color: #A32D2D; }

  .reset-btn {
    background: transparent;
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 8px;
    color: var(--soft);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    padding: 12px 24px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .reset-btn:hover {
    border-color: var(--white);
    color: var(--white);
  }

  .questions-section { }
  .questions-section.hidden { display: none; }
</style>
</head>
<body>

<header>
  <div class="logo">LivEzee Mosaic</div>
  <div class="divider"></div>
  <div class="subtitle">GP Profiler</div>
</header>

<div class="container">

  <div class="intro">
    <h1>Who are you talking to?</h1>
    <p>Answer 8 questions about the GP you just met. The profiler will identify their dominant persona and recommend the pitch angle sequence most likely to work.</p>
  </div>

  <div class="gp-name-row">
    <div class="name-field">
      <label>Doctor's name</label>
      <input type="text" id="gp-name" placeholder="Dr. Name here" />
    </div>
    <div class="location-field">
      <label>Location</label>
      <input type="text" id="gp-location" placeholder="Trivandrum" />
    </div>
  </div>

  <div class="progress-bar"><div class="progress-fill" id="progress"></div></div>

  <div class="questions-section" id="questions-section">
  </div>

  <button class="submit-btn" id="submit-btn" disabled onclick="showResults()">See Persona & Pitch Order →</button>

  <div class="results" id="results">
    <div class="results-header">
      <h2>Profile: <span id="res-name"></span></h2>
      <div class="gp-label" id="res-location"></div>
    </div>

    <div class="primary-persona">
      <div class="label">Primary Persona</div>
      <div class="name" id="primary-name"></div>
      <div class="desc" id="primary-desc"></div>
      <div class="pct" id="primary-pct"></div>
    </div>

    <div class="persona-bars" id="persona-bars"></div>

    <div class="pitch-order">
      <h3>Recommended pitch angle sequence</h3>
      <div id="pitch-list"></div>
    </div>

    <button class="reset-btn" onclick="reset()">← Profile another GP</button>
  </div>

</div>

<script>
const questions = [
  {
    id: 'q1',
    text: 'Roughly what percentage of your active patients are above 60?',
    hint: 'Best estimate is fine',
    options: [
      { text: 'Less than 20%', weights: { p1: 1, p2: 1, p3: 2, p4: 1, p5: 2 } },
      { text: '20–40%', weights: { p1: 2, p2: 2, p3: 2, p4: 2, p5: 2 } },
      { text: '40–60%', weights: { p1: 3, p2: 3, p3: 2, p4: 2, p5: 2 } },
      { text: 'More than 60%', weights: { p1: 4, p2: 3, p3: 1, p4: 2, p5: 1 } },
    ]
  },
  {
    id: 'q2',
    text: 'What keeps you up at night about your elderly patients?',
    hint: 'Pick the closest answer',
    options: [
      { text: 'Missing something clinical between visits', weights: { p1: 4, p2: 1, p3: 1, p4: 2, p5: 3 } },
      { text: 'Losing them to corporate hospitals', weights: { p1: 1, p2: 5, p3: 2, p4: 1, p5: 1 } },
      { text: 'Families abroad calling in a panic', weights: { p1: 2, p2: 1, p3: 1, p4: 5, p5: 1 } },
      { text: 'Not having the time or systems to serve them well', weights: { p1: 2, p2: 2, p3: 3, p4: 1, p5: 4 } },
      { text: 'Revenue pressure — I can\'t grow this practice on consultations alone', weights: { p1: 1, p2: 2, p3: 5, p4: 1, p5: 2 } },
    ]
  },
  {
    id: 'q3',
    text: 'Have you felt the impact of Corporate Hospitals, KIMs, Aster, or others on your patient numbers?',
    hint: '',
    options: [
      { text: 'Significantly — I\'ve lost patients to them', weights: { p1: 1, p2: 5, p3: 2, p4: 1, p5: 1 } },
      { text: 'Somewhat — I\'m watching it closely', weights: { p1: 2, p2: 4, p3: 3, p4: 2, p5: 2 } },
      { text: 'Not really — my patients are loyal', weights: { p1: 4, p2: 1, p3: 2, p4: 2, p5: 2 } },
      { text: 'I haven\'t thought about it much', weights: { p1: 3, p2: 1, p3: 1, p4: 2, p5: 1 } },
    ]
  },
  {
    id: 'q4',
    text: 'What typically happens to your elderly patients in the 6 weeks between your appointments?',
    hint: '',
    options: [
      { text: 'I worry about it — I often find out about things too late', weights: { p1: 5, p2: 2, p3: 1, p4: 2, p5: 2 } },
      { text: 'They end up in corporate hospitals and I lose visibility', weights: { p1: 1, p2: 5, p3: 2, p4: 1, p5: 1 } },
      { text: 'Families manage but they\'re anxious — especially those abroad', weights: { p1: 2, p2: 1, p3: 1, p4: 5, p5: 1 } },
      { text: 'It\'s a systemic gap — there\'s no good solution for it yet', weights: { p1: 2, p2: 2, p3: 2, p4: 1, p5: 5 } },
    ]
  },
  {
    id: 'q5',
    text: 'Have you had a family — especially from abroad — call you in a panic about a parent?',
    hint: '',
    options: [
      { text: 'Yes, frequently — it\'s emotionally draining', weights: { p1: 4, p2: 1, p3: 1, p4: 4, p5: 1 } },
      { text: 'Yes, mostly families abroad — they have no visibility', weights: { p1: 2, p2: 1, p3: 1, p4: 5, p5: 1 } },
      { text: 'Yes, I see it as a liability and reputation risk', weights: { p1: 1, p2: 3, p3: 4, p4: 2, p5: 2 } },
      { text: 'Occasionally, but I manage', weights: { p1: 3, p2: 2, p3: 2, p4: 2, p5: 2 } },
      { text: 'Rarely — my patients have strong local support', weights: { p1: 3, p2: 1, p3: 2, p4: 1, p5: 1 } },
    ]
  },
  {
    id: 'q6',
    text: 'Do you use any digital tools in your practice beyond prescriptions and billing?',
    hint: '',
    options: [
      { text: 'Yes — I actively look for new tools and try them', weights: { p1: 1, p2: 2, p3: 2, p4: 2, p5: 5 } },
      { text: 'Yes — basic tools, mostly because I had to', weights: { p1: 2, p2: 3, p3: 3, p4: 2, p5: 2 } },
      { text: 'No, but I\'m open to it if it\'s simple', weights: { p1: 4, p2: 2, p3: 2, p4: 2, p5: 2 } },
      { text: 'No — I prefer to keep things traditional', weights: { p1: 5, p2: 1, p3: 1, p4: 1, p5: 1 } },
    ]
  },
  {
    id: 'q7',
    text: 'Have you ever thought about adding a structured service for elderly patients — beyond consultations?',
    hint: '',
    options: [
      { text: 'Yes — I\'ve been actively thinking about how to do this', weights: { p1: 1, p2: 2, p3: 5, p4: 2, p5: 3 } },
      { text: 'Yes — but I don\'t know where to start', weights: { p1: 2, p2: 3, p3: 3, p4: 2, p5: 3 } },
      { text: 'Open to it, as long as it doesn\'t add to my workload', weights: { p1: 3, p2: 3, p3: 2, p4: 3, p5: 2 } },
      { text: 'Not really — I focus on clinical care', weights: { p1: 5, p2: 2, p3: 1, p4: 2, p5: 2 } },
    ]
  },
  {
    id: 'q8',
    text: 'Where do you see your practice in 5 years?',
    hint: '',
    options: [
      { text: 'Winding down — thinking about how to transition my patients', weights: { p1: 5, p2: 1, p3: 1, p4: 1, p5: 1 } },
      { text: 'Same but stronger — I want to defend and grow my base', weights: { p1: 2, p2: 5, p3: 2, p4: 1, p5: 1 } },
      { text: 'Expanded — more services, more revenue streams', weights: { p1: 1, p2: 2, p3: 5, p4: 1, p5: 2 } },
      { text: 'Technology-integrated — AI, remote monitoring, data-driven', weights: { p1: 1, p2: 1, p3: 2, p4: 1, p5: 5 } },
      { text: 'Better serving NRI families — that\'s where I see the need', weights: { p1: 1, p2: 1, p3: 1, p4: 5, p5: 2 } },
    ]
  }
];

const personas = {
  p1: {
    name: 'The Protector',
    desc: 'Male, 55–65, solo practice, 25+ years in the same area. Deep community roots. Thinks of patients as his responsibility. Slightly wary of technology.',
    color: '#295c94'
  },
  p2: {
    name: 'The Threatened',
    desc: 'Male or female, 45–55. Watching Apollo/Aster open nearby. Commercially aware and worried. Reads medical business news.',
    color: '#b85042'
  },
  p3: {
    name: 'The Entrepreneur',
    desc: 'Male, 35–45. Runs a small multi-specialty clinic. Thinks about margins and growth. Has hired staff, runs diagnostic tie-ups.',
    color: '#3b6d11'
  },
  p4: {
    name: 'The NRI Doctor',
    desc: 'Male or female, 40–55. Trained abroad or has family abroad. Understands the NRI family dynamic from both sides. High empathy.',
    color: '#854f0b'
  },
  p5: {
    name: 'The Pioneer',
    desc: 'Male or female, 35–50. Early adopter. Reads about AI in medicine. Curious about what\'s coming. Ego invested in being ahead of peers.',
    color: '#533ab7'
  }
};

const pitchAngles = [
  {
    id: 1,
    name: 'The gap',
    desc: 'You can\'t watch your patients between visits. We do. Resonates immediately — low threat, easy yes.',
    baseProb: 65
  },
  {
    id: 2,
    name: 'Corporate threat',
    desc: 'Apollo/Aster/VPS are already pulling your elderly patients. Once they\'re in that system, they rarely come back. Mosaic keeps them yours.',
    baseProb: 70
  },
  {
    id: 3,
    name: 'Eldercare revenue',
    desc: 'Eldercare is a growing segment. You already have the patients. We help you monetise that relationship without building anything.',
    baseProb: 55
  },
  {
    id: 4,
    name: 'Clinical outcomes',
    desc: 'Fewer missed deteriorations. Fewer crisis admissions. Fewer 11pm calls from panicked families. Your clinical reputation improves.',
    baseProb: 60
  },
  {
    id: 5,
    name: 'Family trust',
    desc: 'The family abroad is your biggest risk. One bad event they didn\'t know about and they blame you. Mosaic keeps them informed before they panic.',
    baseProb: 65
  },
  {
    id: 6,
    name: 'Differentiation',
    desc: 'You become the GP who doesn\'t miss things. In a crowded market, that\'s a referral magnet.',
    baseProb: 50
  },
  {
    id: 7,
    name: 'AI / technology',
    desc: 'Vigil as a longitudinal intelligence tool — every data point synthesised into a report that updates itself. Genuinely novel in Kerala eldercare.',
    baseProb: 40
  },
  {
    id: 8,
    name: 'Passive income',
    desc: 'Your existing panel generates monthly income without additional work. Use only after trust is built.',
    baseProb: 45
  },
  {
    id: 9,
    name: 'Legacy / retirement',
    desc: 'When you retire, your patients need continuity. Mosaic ensures your panel is taken care of — your reputation survives you.',
    baseProb: 35
  },
  {
    id: 10,
    name: 'Peer pressure',
    desc: 'Dr. X in your area is already doing this. His families call him first for everything. Kerala medical community is tight — social proof travels fast.',
    baseProb: 55
  }
];

// Pitch angle priority per persona (index = rank order, value = pitch angle id)
const personaPitchOrder = {
  p1: [1, 4, 5, 10, 9, 2, 6, 7, 8, 3],
  p2: [2, 1, 4, 6, 5, 10, 3, 8, 9, 7],
  p3: [3, 2, 6, 8, 10, 4, 5, 7, 9, 1],
  p4: [5, 1, 4, 10, 2, 6, 3, 7, 8, 9],
  p5: [7, 6, 1, 4, 2, 10, 3, 8, 9, 5]
};

// Probability adjustments per persona per pitch angle
const probAdjust = {
  p1: { 1:75, 4:70, 5:55, 10:55, 9:55, 2:50, 6:45, 7:30, 8:25, 3:20 },
  p2: { 2:80, 1:65, 4:60, 6:60, 5:60, 10:55, 3:55, 8:45, 9:35, 7:30 },
  p3: { 3:75, 2:70, 6:70, 8:65, 10:60, 4:50, 5:50, 7:45, 9:30, 1:35 },
  p4: { 5:85, 1:70, 4:65, 10:60, 2:55, 6:55, 3:50, 7:45, 8:40, 9:30 },
  p5: { 7:70, 6:70, 1:55, 4:60, 2:55, 10:55, 3:50, 8:45, 9:25, 5:40 }
};

let answers = {};

function buildQuestions() {
  const section = document.getElementById('questions-section');
  section.innerHTML = '';
  questions.forEach((q, idx) => {
    const block = document.createElement('div');
    block.className = 'question-block';
    block.id = 'block-' + q.id;
    block.innerHTML = `
      <div class="q-number">Question ${idx + 1} of ${questions.length}</div>
      <div class="q-text">${q.text}</div>
      ${q.hint ? `<div class="q-hint">${q.hint}</div>` : ''}
      <div class="options" id="opts-${q.id}"></div>
    `;
    section.appendChild(block);

    const optsDiv = block.querySelector('.options');
    q.options.forEach((opt, oidx) => {
      const btn = document.createElement('button');
      btn.className = 'option';
      btn.innerHTML = `<span class="option-dot"></span><span class="option-text">${opt.text}</span>`;
      btn.onclick = () => selectOption(q.id, oidx);
      optsDiv.appendChild(btn);
    });
  });
}

function selectOption(qid, oidx) {
  answers[qid] = oidx;
  const optsDiv = document.getElementById('opts-' + qid);
  optsDiv.querySelectorAll('.option').forEach((btn, i) => {
    btn.classList.toggle('selected', i === oidx);
  });
  document.getElementById('block-' + qid).classList.add('answered');
  updateProgress();
}

function updateProgress() {
  const total = questions.length;
  const done = Object.keys(answers).length;
  const pct = (done / total) * 100;
  document.getElementById('progress').style.width = pct + '%';
  document.getElementById('submit-btn').disabled = done < total;
}

function computeScores() {
  const scores = { p1: 0, p2: 0, p3: 0, p4: 0, p5: 0 };
  questions.forEach(q => {
    const oidx = answers[q.id];
    if (oidx === undefined) return;
    const w = q.options[oidx].weights;
    Object.keys(w).forEach(p => { scores[p] += w[p]; });
  });
  const total = Object.values(scores).reduce((a, b) => a + b, 0);
  const pcts = {};
  Object.keys(scores).forEach(p => {
    pcts[p] = Math.round((scores[p] / total) * 100);
  });
  return pcts;
}

function showResults() {
  const pcts = computeScores();
  const sorted = Object.entries(pcts).sort((a, b) => b[1] - a[1]);
  const primaryKey = sorted[0][0];
  const primary = personas[primaryKey];

  const gpName = document.getElementById('gp-name').value || 'Unknown GP';
  const gpLoc = document.getElementById('gp-location').value;

  document.getElementById('res-name').textContent = gpName;
  document.getElementById('res-location').textContent = gpLoc ? gpLoc : '';
  document.getElementById('primary-name').textContent = primary.name;
  document.getElementById('primary-desc').textContent = primary.desc;
  document.getElementById('primary-pct').textContent = sorted[0][1] + '%';

  // Bars
  const barsDiv = document.getElementById('persona-bars');
  barsDiv.innerHTML = '';
  sorted.forEach(([key, pct]) => {
    const p = personas[key];
    const row = document.createElement('div');
    row.className = 'persona-bar-row';
    row.innerHTML = `
      <div class="persona-bar-label">${p.name}</div>
      <div class="persona-bar-track"><div class="persona-bar-fill" style="background:${p.color}; width:0%" data-w="${pct}"></div></div>
      <div class="persona-bar-pct">${pct}%</div>
    `;
    barsDiv.appendChild(row);
  });

  // Pitch order based on primary persona
  const pitchOrder = personaPitchOrder[primaryKey];
  const pitchList = document.getElementById('pitch-list');
  pitchList.innerHTML = '';
  pitchOrder.forEach((angleId, rank) => {
    const angle = pitchAngles.find(a => a.id === angleId);
    const prob = probAdjust[primaryKey][angleId];
    const pctClass = prob >= 65 ? 'pct-h' : prob >= 45 ? 'pct-m' : 'pct-l';
    const item = document.createElement('div');
    item.className = 'pitch-item';
    item.innerHTML = `
      <div class="pitch-rank">${rank + 1}</div>
      <div class="pitch-content">
        <div class="pitch-angle-name">${angle.name}</div>
        <div class="pitch-angle-desc">${angle.desc}</div>
      </div>
      <div class="pitch-pct ${pctClass}">${prob}%</div>
    `;
    pitchList.appendChild(item);
  });

  document.getElementById('questions-section').classList.add('hidden');
  document.getElementById('submit-btn').style.display = 'none';
  document.querySelector('.gp-name-row').style.display = 'none';
  document.querySelector('.progress-bar').style.display = 'none';

  const resultsDiv = document.getElementById('results');
  resultsDiv.classList.add('visible');

  setTimeout(() => {
    document.querySelectorAll('.persona-bar-fill').forEach(el => {
      el.style.width = el.dataset.w + '%';
    });
  }, 100);
}

function reset() {
  answers = {};
  document.getElementById('results').classList.remove('visible');
  document.getElementById('questions-section').classList.remove('hidden');
  document.getElementById('submit-btn').style.display = 'block';
  document.getElementById('submit-btn').disabled = true;
  document.querySelector('.gp-name-row').style.display = 'flex';
  document.querySelector('.progress-bar').style.display = 'block';
  document.getElementById('progress').style.width = '0%';
  document.getElementById('gp-name').value = '';
  document.getElementById('gp-location').value = '';
  buildQuestions();
}

buildQuestions();
</script>
</body>
</html>
