<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mosaic — GP Profiler</title>
<link href="https://fonts.googleapis.com/css2?family=Alata&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #1e436c;
    --blue: #295c94;
    --dark: #132a44;
    --gold: #c9a84c;
    --light: #eeeeee;
    --soft: #d4d4d4;
    --white: #ffffff;
    --p1: #295c94;
    --p2: #b85042;
    --p3: #3b6d11;
    --p4: #854f0b;
    --p5: #533ab7;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--dark);
    color: var(--white);
    min-height: 100vh;
  }

  header {
    background: var(--navy);
    border-bottom: 3px solid var(--gold);
    padding: 20px 32px;
    display: flex;
    align-items: center;
    gap: 16px;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  header .logo { font-family: 'Alata', sans-serif; font-size: 22px; color: var(--white); letter-spacing: 0.5px; }
  header .divider { width: 1px; height: 24px; background: rgba(255,255,255,0.3); }
  header .subtitle { font-size: 13px; color: var(--gold); letter-spacing: 1px; text-transform: uppercase; font-weight: 500; }

  .container { max-width: 760px; margin: 0 auto; padding: 40px 24px 80px; }

  .intro { margin-bottom: 40px; }
  .intro h1 { font-family: 'Alata', sans-serif; font-size: 28px; font-weight: 400; color: var(--white); margin-bottom: 10px; line-height: 1.3; }
  .intro p { font-size: 14px; color: var(--soft); line-height: 1.7; }

  .gp-name-row { display: flex; gap: 12px; margin-bottom: 32px; align-items: flex-end; }
  .gp-name-row label { font-size: 12px; text-transform: uppercase; letter-spacing: 1px; color: var(--gold); display: block; margin-bottom: 6px; font-weight: 500; }
  .gp-name-row input { background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.15); border-radius: 6px; color: var(--white); font-family: 'DM Sans', sans-serif; font-size: 14px; padding: 10px 14px; width: 100%; outline: none; transition: border-color 0.2s; }
  .gp-name-row input:focus { border-color: var(--gold); }
  .gp-name-row input::placeholder { color: rgba(255,255,255,0.3); }
  .name-field { flex: 2; }
  .location-field { flex: 1; }

  .progress-bar { height: 3px; background: rgba(255,255,255,0.1); border-radius: 2px; margin-bottom: 36px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--gold); border-radius: 2px; transition: width 0.4s ease; width: 0%; }

  .question-block { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; padding: 24px; margin-bottom: 20px; transition: border-color 0.2s; }
  .question-block.answered { border-color: rgba(201,168,76,0.3); }

  .q-number { font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--gold); font-weight: 500; margin-bottom: 8px; }
  .q-text { font-size: 16px; font-weight: 400; color: var(--white); margin-bottom: 6px; line-height: 1.5; }
  .q-hint { font-size: 12px; color: rgba(255,255,255,0.4); margin-bottom: 18px; font-style: italic; }
  .q-hint.multi { color: rgba(201,168,76,0.7); font-style: normal; }

  .options { display: flex; flex-direction: column; gap: 8px; }

  .option { display: flex; align-items: flex-start; gap: 10px; padding: 10px 14px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); cursor: pointer; transition: all 0.15s; background: transparent; text-align: left; width: 100%; font-family: 'DM Sans', sans-serif; }
  .option:hover { background: rgba(255,255,255,0.06); border-color: rgba(255,255,255,0.2); }
  .option.selected { background: rgba(201,168,76,0.12); border-color: var(--gold); }
  .option.ranked { background: rgba(201,168,76,0.12); border-color: var(--gold); }

  /* Single select dot */
  .option-dot { width: 16px; height: 16px; border-radius: 50%; border: 1.5px solid rgba(255,255,255,0.3); flex-shrink: 0; margin-top: 2px; transition: all 0.15s; display: flex; align-items: center; justify-content: center; }
  .option.selected .option-dot { border-color: var(--gold); background: var(--gold); }
  .option.selected .option-dot::after { content: ''; width: 6px; height: 6px; background: var(--dark); border-radius: 50%; }

  /* Multi-rank badge */
  .rank-badge { width: 20px; height: 20px; border-radius: 50%; border: 1.5px solid rgba(255,255,255,0.3); flex-shrink: 0; margin-top: 1px; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; color: transparent; transition: all 0.15s; }
  .option.ranked .rank-badge { border-color: var(--gold); background: var(--gold); color: var(--dark); }

  .option-text { font-size: 13px; color: rgba(255,255,255,0.8); line-height: 1.5; }
  .option.selected .option-text, .option.ranked .option-text { color: var(--white); }

  .multi-hint { font-size: 11px; color: rgba(201,168,76,0.5); margin-top: 10px; text-align: center; }

  .submit-btn { width: 100%; padding: 16px; background: var(--gold); border: none; border-radius: 8px; font-family: 'Alata', sans-serif; font-size: 16px; color: var(--dark); cursor: pointer; margin-top: 12px; transition: opacity 0.2s; letter-spacing: 0.5px; }
  .submit-btn:hover { opacity: 0.9; }
  .submit-btn:disabled { opacity: 0.3; cursor: not-allowed; }

  /* ── RESULTS ── */
  .results { display: none; }
  .results.visible { display: block; }

  .results-header { margin-bottom: 32px; }
  .results-header h2 { font-family: 'Alata', sans-serif; font-size: 24px; font-weight: 400; margin-bottom: 4px; }
  .results-header .gp-label { font-size: 14px; color: var(--gold); }

  .primary-persona { background: var(--navy); border: 2px solid var(--gold); border-radius: 12px; padding: 24px; margin-bottom: 24px; }
  .primary-persona .label { font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--gold); margin-bottom: 8px; font-weight: 500; }
  .primary-persona .name { font-family: 'Alata', sans-serif; font-size: 26px; color: var(--white); margin-bottom: 6px; }
  .primary-persona .desc { font-size: 13px; color: var(--soft); line-height: 1.6; margin-bottom: 16px; }
  .primary-persona .pct { font-family: 'Alata', sans-serif; font-size: 48px; color: var(--gold); line-height: 1; }

  .persona-bars { display: flex; flex-direction: column; gap: 14px; margin-bottom: 32px; }
  .persona-bar-row { display: flex; align-items: center; gap: 12px; }
  .persona-bar-label { font-size: 12px; color: var(--soft); width: 160px; flex-shrink: 0; line-height: 1.3; }
  .persona-bar-track { flex: 1; height: 8px; background: rgba(255,255,255,0.08); border-radius: 4px; overflow: hidden; }
  .persona-bar-fill { height: 100%; border-radius: 4px; transition: width 1s ease; width: 0%; }
  .persona-bar-pct { font-size: 13px; font-weight: 500; color: var(--white); width: 40px; text-align: right; flex-shrink: 0; }

  /* ── SCRIPT SECTION ── */
  .script-section { display: flex; flex-direction: column; gap: 20px; margin-bottom: 32px; }

  .script-block { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; padding: 20px 22px; }

  .script-block-label { font-size: 10px; text-transform: uppercase; letter-spacing: 2px; color: var(--gold); font-weight: 500; margin-bottom: 12px; }

  .who-text { font-size: 13px; color: var(--soft); line-height: 1.7; }

  /* Stage cards */
  .stage-card { padding: 14px 0; border-bottom: 1px solid rgba(255,255,255,0.06); }
  .stage-card:last-child { border-bottom: none; padding-bottom: 0; }

  .stage-label { font-size: 10px; text-transform: uppercase; letter-spacing: 1.5px; color: rgba(255,255,255,0.35); font-weight: 500; margin-bottom: 8px; }
  .stage-label.highlight { color: var(--gold); }

  .stage-script { font-size: 13px; color: var(--white); line-height: 1.7; background: rgba(255,255,255,0.04); border-left: 2px solid rgba(255,255,255,0.15); padding: 10px 14px; border-radius: 0 6px 6px 0; margin-bottom: 6px; }
  .stage-script.gold-border { border-left-color: var(--gold); background: rgba(201,168,76,0.06); }

  .stage-note { font-size: 11px; color: rgba(255,255,255,0.35); font-style: italic; line-height: 1.5; padding-left: 4px; }

  /* Close block */
  .close-block { background: rgba(201,168,76,0.08); border: 1.5px solid rgba(201,168,76,0.35); border-radius: 12px; padding: 20px 22px; }
  .close-block .script-block-label { color: var(--gold); }
  .close-text { font-size: 14px; color: var(--white); line-height: 1.8; }
  .exit-label { font-size: 10px; text-transform: uppercase; letter-spacing: 2px; color: rgba(255,255,255,0.35); font-weight: 500; margin-top: 16px; margin-bottom: 8px; }
  .exit-text { font-size: 12px; color: rgba(255,255,255,0.6); line-height: 1.7; font-style: italic; }

  /* Objections */
  .objection-card { padding: 14px 0; border-bottom: 1px solid rgba(255,255,255,0.06); }
  .objection-card:last-child { border-bottom: none; padding-bottom: 0; }
  .objection-q { font-size: 12px; color: rgba(255,255,255,0.5); margin-bottom: 8px; font-style: italic; }
  .objection-q::before { content: '"'; }
  .objection-q::after { content: '"'; }
  .objection-a { font-size: 13px; color: var(--white); line-height: 1.7; background: rgba(255,255,255,0.04); border-left: 2px solid var(--p1); padding: 10px 14px; border-radius: 0 6px 6px 0; }

  /* Phone script */
  .phone-block { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; padding: 20px 22px; }
  .phone-script-text { font-size: 13px; color: var(--white); line-height: 1.9; background: rgba(255,255,255,0.04); border-left: 2px solid var(--gold); padding: 14px 16px; border-radius: 0 6px 6px 0; }
  .phone-note { font-size: 11px; color: rgba(255,255,255,0.35); margin-top: 10px; font-style: italic; }

  .reset-btn { background: transparent; border: 1px solid rgba(255,255,255,0.2); border-radius: 8px; color: var(--soft); font-family: 'DM Sans', sans-serif; font-size: 14px; padding: 12px 24px; cursor: pointer; transition: all 0.2s; margin-top: 8px; }
  .reset-btn:hover { border-color: var(--white); color: var(--white); }

  .questions-section.hidden { display: none; }

  @media (max-width: 600px) {
    .gp-name-row { flex-direction: column; }
    .persona-bar-label { width: 120px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">LivEzee Mosaic</div>
  <div class="divider"></div>
  <div class="subtitle">GP Profiler</div>
</header>

<div class="container">

  <div class="intro">
    <h1>Who are you talking to?</h1>
    <p>Answer 8 questions about the GP you just met. The profiler identifies their dominant persona and gives you the exact script to use — stage by stage.</p>
  </div>

  <div class="gp-name-row">
    <div class="name-field">
      <label>Doctor's name</label>
      <input type="text" id="gp-name" placeholder="Dr. Name here" />
    </div>
    <div class="location-field">
      <label>Location</label>
      <input type="text" id="gp-location" placeholder="Trivandrum" />
    </div>
  </div>

  <div class="progress-bar"><div class="progress-fill" id="progress"></div></div>

  <div class="questions-section" id="questions-section"></div>

  <button class="submit-btn" id="submit-btn" disabled onclick="showResults()">See Persona & Script →</button>

  <div class="results" id="results">
    <div class="results-header">
      <h2>Profile: <span id="res-name"></span></h2>
      <div class="gp-label" id="res-location"></div>
    </div>

    <div class="primary-persona">
      <div class="label">Primary Persona</div>
      <div class="name" id="primary-name"></div>
      <div class="desc" id="primary-desc"></div>
      <div class="pct" id="primary-pct"></div>
    </div>

    <div class="persona-bars" id="persona-bars"></div>

    <div class="script-section" id="script-section"></div>

    <button class="reset-btn" onclick="reset()">← Profile another GP</button>
  </div>

</div>

<script>
const questions = [
  {
    id: 'q1',
    text: 'Roughly what percentage of your active patients are above 60?',
    hint: 'Best estimate is fine',
    options: [
      { text: 'Less than 20%',   weights: { p1:1, p2:1, p3:2, p4:1, p5:2 } },
      { text: '20–40%',          weights: { p1:2, p2:2, p3:2, p4:2, p5:2 } },
      { text: '40–60%',          weights: { p1:3, p2:3, p3:2, p4:2, p5:2 } },
      { text: 'More than 60%',   weights: { p1:4, p2:3, p3:1, p4:2, p5:1 } },
    ]
  },
  {
    id: 'q2',
    text: 'What keeps you up at night about your elderly patients?',
    hint: 'Select all that apply · Tap in order of priority — most worrying first',
    multiRank: true,
    options: [
      { text: 'Missing something clinical between visits',                          weights: { p1:4, p2:1, p3:1, p4:2, p5:3 } },
      { text: 'Losing them to corporate hospitals',                                 weights: { p1:1, p2:5, p3:2, p4:1, p5:1 } },
      { text: 'Families abroad calling in a panic',                                 weights: { p1:2, p2:1, p3:1, p4:5, p5:1 } },
      { text: 'Not having the time or systems to serve them well',                  weights: { p1:2, p2:2, p3:3, p4:1, p5:4 } },
      { text: "Revenue pressure — I can't grow this practice on consultations alone", weights: { p1:1, p2:2, p3:5, p4:1, p5:2 } },
    ]
  },
  {
    id: 'q3',
    text: 'Have you felt the impact of corporate hospitals — KIMs, Aster, Apollo — on your patient numbers?',
    hint: '',
    options: [
      { text: "Significantly — I've lost patients to them",    weights: { p1:1, p2:5, p3:2, p4:1, p5:1 } },
      { text: "Somewhat — I'm watching it closely",           weights: { p1:2, p2:4, p3:3, p4:2, p5:2 } },
      { text: "Not really — my patients are loyal",           weights: { p1:4, p2:1, p3:2, p4:2, p5:2 } },
      { text: "I haven't thought about it much",              weights: { p1:3, p2:1, p3:1, p4:2, p5:1 } },
    ]
  },
  {
    id: 'q4',
    text: 'What typically happens to your elderly patients in the 6 weeks between your appointments?',
    hint: 'Select all that apply · Tap in order of how true this is for you',
    multiRank: true,
    options: [
      { text: "I worry about it — I often find out about things too late",          weights: { p1:5, p2:2, p3:1, p4:2, p5:2 } },
      { text: "They end up in corporate hospitals and I lose visibility",            weights: { p1:1, p2:5, p3:2, p4:1, p5:1 } },
      { text: "Families manage but they're anxious — especially those abroad",      weights: { p1:2, p2:1, p3:1, p4:5, p5:1 } },
      { text: "It's a systemic gap — there's no good solution for it yet",          weights: { p1:2, p2:2, p3:2, p4:1, p5:5 } },
    ]
  },
  {
    id: 'q5',
    text: 'Have you had a family — especially from abroad — call you in a panic about a parent?',
    hint: '',
    options: [
      { text: "Yes, frequently — it's emotionally draining",               weights: { p1:4, p2:1, p3:1, p4:4, p5:1 } },
      { text: "Yes, mostly families abroad — they have no visibility",     weights: { p1:2, p2:1, p3:1, p4:5, p5:1 } },
      { text: "Yes, I see it as a liability and reputation risk",          weights: { p1:1, p2:3, p3:4, p4:2, p5:2 } },
      { text: "Occasionally, but I manage",                                weights: { p1:3, p2:2, p3:2, p4:2, p5:2 } },
      { text: "Rarely — my patients have strong local support",            weights: { p1:3, p2:1, p3:2, p4:1, p5:1 } },
    ]
  },
  {
    id: 'q6',
    text: 'Do you use any digital tools in your practice beyond prescriptions and billing?',
    hint: '',
    options: [
      { text: "Yes — I actively look for new tools and try them",          weights: { p1:1, p2:2, p3:2, p4:2, p5:5 } },
      { text: "Yes — basic tools, mostly because I had to",               weights: { p1:2, p2:3, p3:3, p4:2, p5:2 } },
      { text: "No, but I'm open to it if it's simple",                    weights: { p1:4, p2:2, p3:2, p4:2, p5:2 } },
      { text: "No — I prefer to keep things traditional",                 weights: { p1:5, p2:1, p3:1, p4:1, p5:1 } },
    ]
  },
  {
    id: 'q7',
    text: 'Have you thought about adding a structured service for elderly patients — beyond consultations?',
    hint: '',
    options: [
      { text: "Yes — I've been actively thinking about how to do this",   weights: { p1:1, p2:2, p3:5, p4:2, p5:3 } },
      { text: "Yes — but I don't know where to start",                    weights: { p1:2, p2:3, p3:3, p4:2, p5:3 } },
      { text: "Open to it, as long as it doesn't add to my workload",     weights: { p1:3, p2:3, p3:2, p4:3, p5:2 } },
      { text: "Not really — I focus on clinical care",                    weights: { p1:5, p2:2, p3:1, p4:2, p5:2 } },
    ]
  },
  {
    id: 'q8',
    text: 'Where do you see your practice in 5 years?',
    hint: '',
    options: [
      { text: "Winding down — thinking about how to transition my patients",       weights: { p1:5, p2:1, p3:1, p4:1, p5:1 } },
      { text: "Same but stronger — I want to defend and grow my base",             weights: { p1:2, p2:5, p3:2, p4:1, p5:1 } },
      { text: "Expanded — more services, more revenue streams",                    weights: { p1:1, p2:2, p3:5, p4:1, p5:2 } },
      { text: "Technology-integrated — AI, remote monitoring, data-driven",        weights: { p1:1, p2:1, p3:2, p4:1, p5:5 } },
      { text: "Better serving NRI families — that's where I see the need",         weights: { p1:1, p2:1, p3:1, p4:5, p5:2 } },
    ]
  }
];

const personas = {
  p1: { name: 'The Protector',    desc: 'Male, 55–65, solo practice, 25+ years in the same area. Deep community roots. Thinks of patients as his responsibility. Slightly wary of technology and outsiders.', color: '#295c94' },
  p2: { name: 'The Threatened',   desc: 'Male or female, 45–55. Watching Apollo/Aster open nearby. Commercially aware and worried. Reads medical business news. Their elderly panel is their last loyal base.', color: '#b85042' },
  p3: { name: 'The Entrepreneur', desc: 'Male, 35–45. Runs a small multi-specialty clinic. Thinks in margins and systems. Has hired staff, runs diagnostic tie-ups. Commercially minded but maintains professional register.', color: '#3b6d11' },
  p4: { name: 'The NRI Doctor',   desc: 'Male or female, 40–55. Trained abroad or has family abroad. Understands the NRI family dynamic from both sides. Has lived the "parent alone at home" experience personally.', color: '#854f0b' },
  p5: { name: 'The Pioneer',      desc: 'Male or female, 35–50. Early adopter. Reads about AI in medicine. Curious about what\'s coming. Ego invested in being ahead of peers. Wants to co-create, not just buy.', color: '#533ab7' }
};

const personaScripts = {
  p1: {
    who: "Veteran GP, community roots, 25+ years. Sees patients as his responsibility — not his revenue. Trust must be earned before anything is discussed. Wary of outsiders touching his patients. The relationship is everything.",
    stages: [
      { label: "Opening", highlight: false,
        script: "Doctor, I wanted to come and meet you in person because what we're doing is quite different from the usual services you get approached about. Before I tell you anything about us, I'd love to understand your practice a little — if you have ten minutes.",
        note: "You're asking permission. Don't pitch yet. Let him lead." },
      { label: "Diagnostic question", highlight: false,
        script: "You've been practicing here for a long time. With your elderly patients — the ones you've known for years — what happens to them in the weeks between your visits?",
        note: "Let him talk. If he mentions specific patients or names, he's a Protector. Listen for guilt or worry." },
      { label: "The no invite ★", highlight: true,
        script: "Doctor, let me be straightforward with you. What I'm going to share may not be relevant to how you practice — and if that's the case, please tell me. I'd rather know that now than waste your time.",
        note: "Most important line. Lowers his guard completely. He will almost never say no here — but having been given the choice, he's now genuinely listening." },
      { label: "Core pitch", highlight: false,
        script: "We work alongside GPs — quietly, in the background. We have a trained person who checks in regularly with your elderly patients between your appointments. This is not a clinical call — we're not replacing you in any way. What we're doing is extending your visibility into the parts of your patient's life you currently can't see. Are they managing their day-to-day without stress? Is their mood stable? Are there early signs of cognitive change that haven't surfaced in a consultation yet? Think of us as an instrument you didn't have before. The way an ECG gives you something a stethoscope can't — we give you a continuous picture of your patient's functional and emotional wellbeing between your visits. If something seems off — clinically, emotionally, practically — we flag it to you immediately. You decide what to do.",
        note: "Pause after this. Don't add more. Let it land." },
      { label: "The bridge", highlight: false,
        script: "The families of your elderly patients — do any of them call you more than they should? Checking in, worrying?",
        note: "He will say yes. This is where the emotional connection happens. You're describing his actual life, not a product." }
    ],
    close: "Think of one patient — just one — whose family calls you more than they should. Let us work with that family for 30 days. You'll see exactly how we operate, you stay informed at every step, and if at any point it doesn't feel right — you say the word and we stop. No paperwork, no commitment beyond that one family.",
    exit: "Doctor, I'm not here to convince you today. Can I leave you something to read — and if it makes sense after you've had a chance to think, we can talk again? I'd rather you come to this feeling certain than feeling pushed.",
    objections: [
      { q: "I don't want someone else contacting my patients",
        a: "That's exactly the right concern, and I'm glad you raised it. We never approach your patient independently. We only reach out once you've made the introduction — on your terms, in whatever way feels right to you. Your relationship with them doesn't change. We work behind it, not in front of it." },
      { q: "What if something goes wrong?",
        a: "If something seems clinically off, the first call we make is to you — not to the family, not to anyone else. You decide what happens next. We're not here to make clinical decisions. We're here to make sure you're never the last to know." }
    ]
  },
  p2: {
    who: "Commercially aware, 45–55. The corporate hospital expansion is personal. Their elderly panel is the last loyal segment and they know it. Reads the room fast. The close needs to feel like their own strategic decision — not something sold to them.",
    stages: [
      { label: "Opening", highlight: false,
        script: "Doctor, I'll be direct — I'm not here to sell you something today. I wanted to share what we're seeing in the market and get your perspective on it.",

const PHONE_SCRIPT = `Doctor, good morning — my name is [name], I'm calling from LivEzee Eldercare in Trivandrum. We work alongside GPs here in Kerala to stay connected with their elderly patients between appointments — checking in on their daily wellbeing, cognitive state, emotional health, practical needs. Not clinical — we're an extension of your visibility, not a replacement for it.

Many GPs we speak to tell us the same thing — they find out things went wrong only when the patient comes back. We're trying to close that gap.

I'd like to meet you briefly — 20 minutes — just to understand your practice and share what we're doing with a few GPs in Trivandrum. No paperwork, no commitment. Would you have time this week or early next week?`;

let answers = {};

function buildQuestions() {
  const section = document.getElementById('questions-section');
  section.innerHTML = '';
  questions.forEach((q, idx) => {
    const block = document.createElement('div');
    block.className = 'question-block';
    block.id = 'block-' + q.id;

    const hintClass = q.multiRank ? 'q-hint multi' : 'q-hint';
    const hintText = q.hint || '';

    block.innerHTML = `
      <div class="q-number">Question ${idx + 1} of ${questions.length}</div>
      <div class="q-text">${q.text}</div>
      ${hintText ? `<div class="${hintClass}">${hintText}</div>` : ''}
      <div class="options" id="opts-${q.id}"></div>
      ${q.multiRank ? '<div class="multi-hint">Tap again to deselect</div>' : ''}
    `;
    section.appendChild(block);

    renderOptions(q);
  });
}

function renderOptions(q) {
  const optsDiv = document.getElementById('opts-' + q.id);
  optsDiv.innerHTML = '';

  if (q.multiRank) {
    const ranked = answers[q.id] || [];
    q.options.forEach((opt, oidx) => {
      const rankPos = ranked.indexOf(oidx);
      const isRanked = rankPos >= 0;
      const btn = document.createElement('button');
      btn.className = 'option' + (isRanked ? ' ranked' : '');
      btn.innerHTML = `
        <span class="rank-badge">${isRanked ? rankPos + 1 : ''}</span>
        <span class="option-text">${opt.text}</span>
      `;
      btn.onclick = () => selectMultiRank(q.id, oidx, q);
      optsDiv.appendChild(btn);
    });
  } else {
    const selected = answers[q.id];
    q.options.forEach((opt, oidx) => {
      const btn = document.createElement('button');
      btn.className = 'option' + (selected === oidx ? ' selected' : '');
      btn.innerHTML = `<span class="option-dot"></span><span class="option-text">${opt.text}</span>`;
      btn.onclick = () => selectSingle(q.id, oidx, q);
      optsDiv.appendChild(btn);
    });
  }
}

function selectSingle(qid, oidx, q) {
  answers[qid] = oidx;
  renderOptions(q);
  document.getElementById('block-' + qid).classList.add('answered');
  updateProgress();
}

function selectMultiRank(qid, oidx, q) {
  if (!answers[qid]) answers[qid] = [];
  const arr = answers[qid];
  const existingIdx = arr.indexOf(oidx);
  if (existingIdx >= 0) {
    arr.splice(existingIdx, 1);
  } else {
    arr.push(oidx);
  }
  renderOptions(q);
  const block = document.getElementById('block-' + qid);
  block.classList.toggle('answered', arr.length > 0);
  updateProgress();
}

function isAnswered(qid) {
  const q = questions.find(q => q.id === qid);
  if (q.multiRank) return answers[qid] && answers[qid].length > 0;
  return answers[qid] !== undefined;
}

function updateProgress() {
  const done = questions.filter(q => isAnswered(q.id)).length;
  const pct = (done / questions.length) * 100;
  document.getElementById('progress').style.width = pct + '%';
  document.getElementById('submit-btn').disabled = done < questions.length;
}

function computeScores() {
  const scores = { p1: 0, p2: 0, p3: 0, p4: 0, p5: 0 };
  const rankWeights = [1.0, 0.6, 0.3, 0.15, 0.1];

  questions.forEach(q => {
    if (q.multiRank) {
      const ranked = answers[q.id] || [];
      ranked.forEach((oidx, rank) => {
        const w = q.options[oidx].weights;
        const mult = rankWeights[rank] !== undefined ? rankWeights[rank] : 0.05;
        Object.keys(w).forEach(p => { scores[p] += w[p] * mult; });
      });
    } else {
      const oidx = answers[q.id];
      if (oidx === undefined) return;
      const w = q.options[oidx].weights;
      Object.keys(w).forEach(p => { scores[p] += w[p]; });
    }
  });

  const total = Object.values(scores).reduce((a, b) => a + b, 0);
  const pcts = {};
  Object.keys(scores).forEach(p => { pcts[p] = Math.round((scores[p] / total) * 100); });
  return pcts;
}

function showResults() {
  const pcts = computeScores();
  const sorted = Object.entries(pcts).sort((a, b) => b[1] - a[1]);
  const primaryKey = sorted[0][0];
  const primary = personas[primaryKey];
  const script = personaScripts[primaryKey];

  const gpName = document.getElementById('gp-name').value || 'Unknown GP';
  const gpLoc  = document.getElementById('gp-location').value;

  document.getElementById('res-name').textContent = gpName;
  document.getElementById('res-location').textContent = gpLoc || '';
  document.getElementById('primary-name').textContent = primary.name;
  document.getElementById('primary-desc').textContent = primary.desc;
  document.getElementById('primary-pct').textContent = sorted[0][1] + '%';

  // Bars
  const barsDiv = document.getElementById('persona-bars');
  barsDiv.innerHTML = '';
  sorted.forEach(([key, pct]) => {
    const p = personas[key];
    const row = document.createElement('div');
    row.className = 'persona-bar-row';
    row.innerHTML = `
      <div class="persona-bar-label">${p.name}</div>
      <div class="persona-bar-track"><div class="persona-bar-fill" style="background:${p.color};width:0%" data-w="${pct}"></div></div>
      <div class="persona-bar-pct">${pct}%</div>
    `;
    barsDiv.appendChild(row);
  });

  // Script section
  const ss = document.getElementById('script-section');
  ss.innerHTML = '';

  // WHO YOU'RE TALKING TO
  const whoBlock = document.createElement('div');
  whoBlock.className = 'script-block';
  whoBlock.innerHTML = `<div class="script-block-label">Who You're Talking To</div><div class="who-text">${script.who}</div>`;
  ss.appendChild(whoBlock);

  // THE CONVERSATION
  const convBlock = document.createElement('div');

    stagesHTML += `
      <div class="stage-card">
        <div class="stage-label ${stage.highlight ? 'highlight' : ''}">${stage.label}</div>
        <div class="stage-script ${stage.highlight ? 'gold-border' : ''}">${stage.script}</div>
        ${stage.note ? `<div class="stage-note">${stage.note}</div>` : ''}
      </div>
    `;
  });
  convBlock.innerHTML = stagesHTML;
  ss.appendChild(convBlock);

  // THE CLOSE
  const closeBlock = document.createElement('div');
  closeBlock.className = 'close-block';
  closeBlock.innerHTML = `
    <div class="script-block-label">The Close</div>
    <div class="close-text">${script.close}</div>
    <div class="exit-label">If They're Still Hesitant</div>
    <div class="exit-text">${script.exit}</div>
  `;
  ss.appendChild(closeBlock);

  // OBJECTIONS
  const objBlock = document.createElement('div');
  objBlock.className = 'script-block';
  let objHTML = `<div class="script-block-label">If They Push Back</div>`;
  script.objections.forEach(obj => {
    objHTML += `
      <div class="objection-card">
        <div class="objection-q">${obj.q}</div>
        <div class="objection-a">${obj.a}</div>
      </div>
    `;
  });
  objBlock.innerHTML = objHTML;
  ss.appendChild(objBlock);

  // PHONE SCRIPT
  const phoneBlock = document.createElement('div');
  phoneBlock.className = 'phone-block';
  phoneBlock.innerHTML = `
    <div class="script-block-label">Cold Call Script</div>
    <div class="phone-script-text">${PHONE_SCRIPT.replace(/\n\n/g, '<br><br>')}</div>
    <div class="phone-note">Universal opener — Protector-led register. Use regardless of suspected persona. Profile in the room.</div>
  `;
  ss.appendChild(phoneBlock);

  // Hide form
  document.getElementById('questions-section').classList.add('hidden');
  document.getElementById('submit-btn').style.display = 'none';
  document.querySelector('.gp-name-row').style.display = 'none';
  document.querySelector('.progress-bar').style.display = 'none';
  document.querySelector('.intro').style.display = 'none';

  document.getElementById('results').classList.add('visible');

  setTimeout(() => {
    document.querySelectorAll('.persona-bar-fill').forEach(el => {
      el.style.width = el.dataset.w + '%';
    });
  }, 100);
}

function reset() {
  answers = {};
  document.getElementById('results').classList.remove('visible');
  document.getElementById('questions-section').classList.remove('hidden');
  document.getElementById('submit-btn').style.display = 'block';
  document.getElementById('submit-btn').disabled = true;
  document.querySelector('.gp-name-row').style.display = 'flex';
  document.querySelector('.progress-bar').style.display = 'block';
  document.querySelector('.intro').style.display = 'block';
  document.getElementById('progress').style.width = '0%';
  document.getElementById('gp-name').value = '';
  document.getElementById('gp-location').value = '';
  buildQuestions();
}

buildQuestions();
</script>
